name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    uses: and3rn3t/.github/.github/workflows/reusable-cloudflare-pages-deploy.yml@v1
    with:
      project-name: jwst-deep-sky-explorer
      build-command: build:production
      build-env-json: '{"VITE_NASA_API_BASE": "https://images-api.nasa.gov"}'
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  comment:
    needs: deploy
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Create deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number } = context.issue;
            const deployment_url = `https://jwst.andernet.dev`;
            const preview_url = `https://jwst-deep-sky-explorer.pages.dev`;
            const comment = `🚀 **Deployment Preview Ready!**

            **Production URL:** ${deployment_url}
            **Preview URL:** ${preview_url}
            **Branch:** \`${context.payload.pull_request.head.ref}\`
            **Commit:** \`${context.sha.substring(0, 7)}\`

            ✅ Build completed successfully
            🔍 [View deployment logs](https://github.com/${owner}/${repo}/actions/runs/${context.runId})`;

            github.rest.issues.createComment({
              owner,
              repo,
              issue_number: number,
              body: comment
            });
