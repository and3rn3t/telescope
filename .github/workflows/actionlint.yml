# Validate workflow YAML against the real Actions schema on every PR that
# touches .github/workflows/. See reusable-actionlint.yml.
name: Actionlint

on:
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    uses: and3rn3t/.github/.github/workflows/reusable-actionlint.yml@bac71674cf57c550774f71a70e32a5bb7bec48ad # v1
