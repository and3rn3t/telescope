# Consistency guard — warns on PRs when baseline config files drift from
# ai-template-repo. Switch mode to "fail" once the repo is clean to block drift.
name: Consistency

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard:
    uses: and3rn3t/.github/.github/workflows/reusable-consistency-guard.yml@bac71674cf57c550774f71a70e32a5bb7bec48ad # v1
    with:
      mode: warn
